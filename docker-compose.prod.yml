# ============================================================
#  ChronoGest — Docker Compose de PRODUCCIÓN
#  No modifica docker-compose.yml (que sigue siendo el de desarrollo).
#  Usa los mismos Dockerfiles, pero con los targets "prod":
#    - backend  -> target prod (compilado + PM2)
#    - frontend -> target prod (build Angular servido por Nginx)
#
#  Uso:
#    docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:

  postgres:
    image: postgres:14.3
    container_name: chronogest_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: chronogest2024
      POSTGRES_DB: epsas_db
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
      - ./docker/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    networks:
      - chronogest_net_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: chronogest_redis_prod
    restart: unless-stopped
    networks:
      - chronogest_net_prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: chronogest-backend-prod
    build:
      context: ./backend-epsas
      dockerfile: Dockerfile
      target: prod
    container_name: chronogest_backend_prod
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: production
      TZ: America/Bogota
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: chronogest2024
      DB_NAME: epsas_db
      HORARIOS_DB_HOST: postgres
      HORARIOS_DB_PORT: 5432
      HORARIOS_DB_NAME: horarios_db
      MASTER_DB_HOST: postgres
      MASTER_DB_PORT: 5432
      MASTER_DB_USER: postgres
      MASTER_DB_PASSWORD: chronogest2024
      MASTER_DB_NAME: chronogest_master_db
      JWT_SECRET: chronogest_sena_jwt_secret_2024_very_secure_key_abc123
      ROOT_JWT_SECRET: chronogest_root_jwt_secret_cambia_esto_en_produccion
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Reemplazar por la IP o el dominio real del servidor en producción:
      CORS_ORIGIN: http://localhost
    ports:
      - "3000:3000"
    volumes:
      - uploads_data_prod:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chronogest_net_prod

  frontend:
    image: chronogest-frontend-prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    container_name: chronogest_frontend_prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - chronogest_net_prod

networks:
  chronogest_net_prod:
    driver: bridge

volumes:
  pgdata_prod:
  uploads_data_prod:
