# ============================================================
#  Proxy LOCAL para simular subdominios de tenant (Centro de
#  Formación) antes del despliegue real. NO se usa en producción
#  — esa config sigue siendo docker/nginx.conf (sin cambios).
#
#  Funciona con cualquier host "<slug>.localhost" gracias a que
#  los navegadores y Node resuelven *.localhost a 127.0.0.1 sin
#  necesidad de tocar el archivo hosts (RFC 6761). Si tu entorno
#  no lo resuelve automáticamente, añade las entradas manualmente
#  en C:\Windows\System32\drivers\etc\hosts.
# ============================================================
server {
    listen 80;
    server_name ~^(?<tenant>[^.]+)\.localhost$ localhost;

    # API del backend NestJS — se reenvía el Host original para que
    # CentroTenantMiddleware extraiga el subdominio como slug del tenant.
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass       http://backend:3000/uploads/;
        proxy_set_header Host $host;
    }

    # Frontend Angular (ng serve) — incluye soporte de websocket para
    # el live-reload del dev server.
    location / {
        proxy_pass         http://frontend:4200/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
